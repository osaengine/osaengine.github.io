<section class="hero">
    <h2>Choose Your Language / Выберите язык</h2>
    <p>Select your preferred language to continue</p>
</section>

<div class="lang-picker">
    <div class="lang-picker-grid">
        <a href="/en/" class="lang-picker-card">
            <span class="lang-picker-flag">🇬🇧</span>
            <span class="lang-picker-name">English</span>
        </a>
        <a href="/ru/" class="lang-picker-card">
            <span class="lang-picker-flag">🇷🇺</span>
            <span class="lang-picker-name">Русский</span>
        </a>
        <a href="/zh/" class="lang-picker-card">
            <span class="lang-picker-flag">🇨🇳</span>
            <span class="lang-picker-name">中文</span>
        </a>
        <a href="/es/" class="lang-picker-card">
            <span class="lang-picker-flag">🇪🇸</span>
            <span class="lang-picker-name">Español</span>
        </a>
        <a href="/de/" class="lang-picker-card">
            <span class="lang-picker-flag">🇩🇪</span>
            <span class="lang-picker-name">Deutsch</span>
        </a>
    </div>
</div>

<script>
// Auto-redirect based on browser language
(function() {
    const savedLang = localStorage.getItem('osengine_lang');
    if (savedLang) {
        window.location.href = '/' + savedLang + '/';
        return;
    }

    const browserLang = navigator.language || navigator.userLanguage;
    const langMap = {
        'ru': 'ru', 'zh': 'zh', 'es': 'es', 'de': 'de'
    };

    for (const [prefix, lang] of Object.entries(langMap)) {
        if (browserLang.startsWith(prefix)) {
            window.location.href = '/' + lang + '/';
            return;
        }
    }

    // Default to English
    window.location.href = '/en/';
})();
</script>
